<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <!-- Ocean Depths / Night Sky Background -->
    <linearGradient id="ocean-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#020813" />
      <stop offset="35%" stop-color="#01040a" />
      <stop offset="40%" stop-color="#000914" />
      <stop offset="70%" stop-color="#00040a" />
      <stop offset="100%" stop-color="#000104" />
    </linearGradient>

    <!-- Lunar Glow Overlay -->
    <radialGradient id="light-glow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ffffd0" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>

    <!-- Lunar Light Rays -->
    <linearGradient id="god-ray-1" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffffd0" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </linearGradient>

    <!-- Sleek Blueprint Grid Pattern -->
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#ffff00" stroke-width="0.5" opacity="0.03" />
      <circle cx="0" cy="0" r="0.75" fill="#ffff00" opacity="0.08" />
    </pattern>

    <!-- Propeller Metallic Gradient -->
    <linearGradient id="prop-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#edd282" />
      <stop offset="50%" stop-color="#c4a747" />
      <stop offset="100%" stop-color="#735b18" />
    </linearGradient>

    <!-- Volumetric Gradients -->
    <linearGradient id="hull-upper-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3d4146" />
      <stop offset="30%" stop-color="#282b2f" />
      <stop offset="75%" stop-color="#181a1c" />
      <stop offset="100%" stop-color="#0e1012" />
    </linearGradient>
    
    <linearGradient id="hull-lower-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7e3f37" />
      <stop offset="30%" stop-color="#612f29" />
      <stop offset="75%" stop-color="#421e1a" />
      <stop offset="100%" stop-color="#2a110e" />
    </linearGradient>
    
    <linearGradient id="hull-transition-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#282b2f" />
      <stop offset="50%" stop-color="#181a1c" />
      <stop offset="50.1%" stop-color="#612f29" />
      <stop offset="100%" stop-color="#421e1a" />
    </linearGradient>

    <filter id="blur-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .hull-upper { fill: url(#hull-upper-grad); stroke: #ffffff; stroke-width: 0.5; stroke-opacity: 0.15; }
    .hull-lower { fill: url(#hull-lower-grad); stroke: #ffffff; stroke-width: 0.5; stroke-opacity: 0.15; }
    .hull-transition { fill: url(#hull-transition-grad); }
    .waterline { stroke: #121316; stroke-width: 1.5; stroke-opacity: 0.8; }
    
    .propeller { fill: url(#prop-grad); transform-origin: 80px 160px; animation: prop-spin 3s linear infinite; }
    .details { fill: #121315; }
    .red-star { fill: #e63946; }
    
    .text-main { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 15px; fill: #fbf05f; font-weight: 800; letter-spacing: 1.5px; }
    .text-red { fill: #e63946; }
    .text-sub { font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace; font-size: 10px; fill: #ffd54f; opacity: 0.8; letter-spacing: 0.5px; }
    .hud-label { font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace; font-size: 8px; fill: #ffd54f; }

    @keyframes prop-spin { 0% { transform: scaleY(1); } 50% { transform: scaleY(-1); } 100% { transform: scaleY(1); } }
    @keyframes prop-flicker { 0% { opacity: 0.2; } 100% { opacity: 0.45; } }
    @keyframes sway-1 { 0%, 100% { transform: skewX(-3deg) scaleX(0.96); } 50% { transform: skewX(3deg) scaleX(1.04); } }
    
    /* Surfaced bobbing on surface waves */
    @keyframes bob { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-8px) rotate(-0.5deg); } }
    @keyframes drift { 0% { transform: translate(0, 0); opacity: 0; } 15% { opacity: 0.4; } 85% { opacity: 0.4; } 100% { transform: translate(-150px, -50px); opacity: 0; } }
    @keyframes radar { 0% { r: 10; opacity: 0.8; stroke-width: 3; } 100% { r: 280; opacity: 0; stroke-width: 0.5; } }
    
    @keyframes bubble-drift-1 { 0% { transform: translate(0, 0) scale(0.5); opacity: 0; } 15% { opacity: 0.7; } 80% { opacity: 0.6; } 100% { transform: translate(-240px, -18px) scale(2.2); opacity: 0; } }
    @keyframes bubble-drift-2 { 0% { transform: translate(0, 0) scale(0.5); opacity: 0; } 10% { opacity: 0.8; } 85% { opacity: 0.7; } 100% { transform: translate(-270px, 14px) scale(2.6); opacity: 0; } }
    @keyframes bubble-drift-3 { 0% { transform: translate(0, 0) scale(0.4); opacity: 0; } 20% { opacity: 0.6; } 75% { opacity: 0.5; } 100% { transform: translate(-190px, -4px) scale(1.8); opacity: 0; } }
    @keyframes ripple { 0% { transform: scale(0.96); opacity: 0.05; } 50% { opacity: 0.35; } 100% { transform: scale(1.04); opacity: 0; } }
    
    @keyframes blink-slow { 0%, 100% { opacity: 0.25; } 50% { opacity: 1; } }
    @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

    /* Surface Waves Rolling */
    @keyframes wave-roll-front { 0% { transform: translate(0, 0); } 50% { transform: translate(-15px, 2px); } 100% { transform: translate(0, 0); } }
    @keyframes wave-roll-back { 0% { transform: translate(0, 0); } 50% { transform: translate(20px, -2px); } 100% { transform: translate(0, 0); } }

    /* Dolphin leaping out of water */
    @keyframes dolphin-leap {
      0% { transform: translate(50px, 220px) rotate(-35deg); opacity: 0; }
      15% { opacity: 0.7; }
      30% { transform: translate(110px, 130px) rotate(5deg); }
      45% { transform: translate(180px, 180px) rotate(35deg); opacity: 0.7; }
      60%, 100% { transform: translate(220px, 230px) rotate(45deg); opacity: 0; }
    }

    .ray-1 { transform-origin: 200px 0px; animation: sway-1 10s infinite ease-in-out; }
    .sub { transform-origin: 400px 200px; animation: bob 9s infinite ease-in-out; }
    
    .bubble { fill: none; stroke: #00f0ff; stroke-width: 0.75; fill-opacity: 0.12; filter: url(#blur-glow); }
    .bubble-1 { animation: bubble-drift-1 infinite linear; }
    .bubble-2 { animation: bubble-drift-2 infinite linear; }
    .bubble-3 { animation: bubble-drift-3 infinite linear; }
    
    .mote { fill: #ffff00; opacity: 0; animation: drift 9s infinite linear; }
    .sonar-ping { fill: none; stroke: #ffff00; transform-origin: 750px 160px; animation: radar 3.5s infinite ease-out; }
    .bow-wave { fill: none; stroke: #00f0ff; stroke-width: 1.5; transform-origin: 760px 160px; animation: ripple 2s infinite ease-out; filter: url(#blur-glow); }
    .star { fill: #ffffff; animation: twinkle infinite ease-in-out; }
    
    .beacon-yellow { animation: blink-slow 1.5s infinite; }
    .sea-wave-back { fill: #010e1a; animation: wave-roll-back 8s infinite ease-in-out; }
    .sea-wave-front { fill: #01060e; animation: wave-roll-front 6s infinite ease-in-out; }
    .dolphin { animation: dolphin-leap 12s infinite ease-in-out; }
  </style>

  <!-- Ocean / Sky Background -->
  <rect width="100%" height="100%" fill="url(#ocean-bg)" />
  <rect width="100%" height="100%" fill="url(#light-glow)" />

  <!-- Twinkling Night Stars -->
  <circle cx="45"  cy="30"  r="0.8" class="star" style="animation-delay: 0.1s; animation-duration: 2.2s;" />
  <circle cx="120" cy="85"  r="0.5" class="star" style="animation-delay: 1.5s; animation-duration: 3.5s;" />
  <circle cx="210" cy="40"  r="1.2" class="star" style="animation-delay: 0.8s; animation-duration: 4.1s;" />
  <circle cx="280" cy="110" r="0.6" class="star" style="animation-delay: 2.3s; animation-duration: 2.8s;" />
  <circle cx="340" cy="50"  r="1.0" class="star" style="animation-delay: 0.4s; animation-duration: 3.0s;" />
  <circle cx="430" cy="95"  r="0.7" class="star" style="animation-delay: 3.1s; animation-duration: 2.5s;" />
  <circle cx="510" cy="35"  r="1.4" class="star" style="animation-delay: 1.1s; animation-duration: 4.9s;" />
  <circle cx="590" cy="115" r="0.5" class="star" style="animation-delay: 2.6s; animation-duration: 3.2s;" />
  <circle cx="650" cy="65"  r="1.0" class="star" style="animation-delay: 0.9s; animation-duration: 2.7s;" />
  <circle cx="730" cy="40"  r="0.8" class="star" style="animation-delay: 1.7s; animation-duration: 3.9s;" />
  <circle cx="780" cy="90"  r="1.1" class="star" style="animation-delay: 0.2s; animation-duration: 2.1s;" />

  <!-- Moon glow disk -->
  <circle cx="700" cy="50" r="12" fill="#ffffd0" opacity="0.1" filter="url(#blur-glow)" />

  <!-- Rolling Sea Wave (Back Layer) -->
  <path d="M 0 158 C 100 153, 150 163, 200 158 C 250 153, 300 163, 350 158 C 400 153, 450 163, 500 158 C 550 153, 600 163, 650 158 C 700 153, 750 163, 800 158 L 800 400 L 0 400 Z" class="sea-wave-back" />

  <!-- Leaping Dolphin -->
  <g class="dolphin">
    <path d="M 0 0 C 4 -8, 12 -12, 20 -8 C 16 -4, 8 -2, 0 0 Z" fill="#ffd54f" opacity="0.4" />
    <path d="M 12 -10 L 15 -14 L 14 -8 Z" fill="#ffd54f" opacity="0.4" /> <!-- Dorsal fin -->
  </g>

  <!-- Blueprint Grid -->
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Shimmering God Ray (Moonlight) -->
  <g>
    <polygon points="500,-50 650,-50 950,500 700,500" fill="url(#god-ray-1)" class="ray-1" />
  </g>

  <!-- Floating Marine Snow -->
  <circle cx="315" cy="386" r="1.3" class="mote" style="animation-delay: 7.4s; animation-duration: 11.6s;" />
  <circle cx="277" cy="137" r="0.8" class="mote" style="animation-delay: 4.6s; animation-duration: 15.6s;" />
  <circle cx="297" cy="305" r="1.3" class="mote" style="animation-delay: 1.2s; animation-duration: 8.2s;" />
  <circle cx="697" cy="363" r="1.3" class="mote" style="animation-delay: 0.6s; animation-duration: 12.3s;" />

  <!-- Title Overlay -->
  <text x="30" y="40" class="text-main">TYPHOON CLASS SUBMARINE <tspan class="text-red">RED OCTOBER</tspan></text>
  <text x="30" y="58" class="text-sub">STATUS: SURFACED / NIGHT OPS (LATE NIGHT PUSH)</text>

  <!-- HUD Telemetry Panel -->
  <g class="hud-text" opacity="0.6">
    <text x="770" y="38" class="hud-label" text-anchor="end">SYS.LOC: 56.31 N, 31.40 E</text>
    <text x="770" y="52" class="hud-label" text-anchor="end">SPD: 8.7 KTS | DEPTH: 40M</text>
  </g>

  <!-- Depth Scale at the Bow (static HUD element) -->
  <g class="hud-element" opacity="0.35">
    <line x1="775" y1="120" x2="775" y2="280" stroke="#ffd54f" stroke-width="0.75" />
    <line x1="771" y1="120" x2="775" y2="120" stroke="#ffd54f" stroke-width="0.75" />
    <text x="766" y="123" class="hud-label" text-anchor="end">ALT 40m</text>
    
    <line x1="771" y1="160" x2="775" y2="160" stroke="#ffd54f" stroke-width="0.75" />
    <text x="766" y="163" class="hud-label" text-anchor="end">0m</text>
    
    <line x1="771" y1="200" x2="775" y2="200" stroke="#ffd54f" stroke-width="0.75" />
    <text x="766" y="203" class="hud-label" text-anchor="end">40m</text>
    
    <line x1="771" y1="240" x2="775" y2="240" stroke="#ffd54f" stroke-width="0.75" />
    <text x="766" y="243" class="hud-label" text-anchor="end">80m</text>
    
    <line x1="771" y1="280" x2="775" y2="280" stroke="#ffd54f" stroke-width="0.75" />
    <text x="766" y="283" class="hud-label" text-anchor="end">120m</text>
  </g>

  <!-- Rolling Sea Wave (Front Layer) -->
  <path d="M 0 160 C 100 155, 150 165, 200 160 C 250 155, 300 165, 350 160 C 400 155, 450 165, 500 160 C 550 155, 600 165, 650 160 C 700 155, 750 165, 800 160 L 800 400 L 0 400 Z" class="sea-wave-front" />

  <!-- Submarine Main Group -->
  <g class="sub" transform="translate(10, 40)" opacity="0.95">
    <!-- Sonar ping -->
    <circle cx="750" cy="160" class="sonar-ping" />
    <circle cx="750" cy="160" class="sonar-ping" style="animation-delay: 1.75s; stroke-dasharray: 8 12;" />

    <!-- Propeller Cavitation Bubbles (Hand-crafted Stream) -->
    <circle cx="80" cy="159" r="1.2" class="bubble bubble-1" style="animation-delay: 0.0s; animation-duration: 1.4s;" />
    <circle cx="80" cy="161" r="2.0" class="bubble bubble-2" style="animation-delay: 0.2s; animation-duration: 1.6s;" />
    <circle cx="80" cy="158" r="1.5" class="bubble bubble-3" style="animation-delay: 0.4s; animation-duration: 1.3s;" />
    <circle cx="80" cy="160" r="2.4" class="bubble bubble-1" style="animation-delay: 0.6s; animation-duration: 1.5s;" />
    <circle cx="80" cy="162" r="1.0" class="bubble bubble-2" style="animation-delay: 0.8s; animation-duration: 1.7s;" />
    
    <!-- Hydrodynamic bow waves -->
    <path d="M 740 145 C 770 148, 785 155, 785 160 C 785 165, 770 172, 740 175" class="bow-wave" />
    <path d="M 745 140 C 780 145, 795 155, 795 160 C 795 165, 780 175, 745 180" class="bow-wave" style="animation-delay: 0.6s; opacity: 0.3;" />

    <!-- Depth Indicator pointer (moves dynamically with the sub's bobbing) -->
    <g>
      <polygon points="768,160 762,157 762,163" fill="#ffd54f" />
      <line x1="762" y1="160" x2="720" y2="160" stroke="#ffd54f" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.6" />
    </g>

    <!-- Propeller motion blur disk -->
    <g style="animation: prop-flicker 0.12s infinite alternate;">
      <ellipse cx="80" cy="160" rx="6" ry="24" fill="url(#prop-grad)" opacity="0.2" filter="url(#blur-glow)" />
    </g>

    <!-- Hull-to-propeller connection structure -->
    <path d="M 150 145 L 80 155 L 80 165 L 150 175 Z" class="hull-transition" />
    
    <!-- Propeller blades -->
    <g class="propeller">
      <path d="M 85 160 L 75 140 L 80 140 L 90 155 Z" />
      <path d="M 85 160 L 75 180 L 80 180 L 90 165 Z" />
      <path d="M 85 155 L 70 160 L 85 165 Z" />
    </g>

    <!-- Hull and details -->
    <path d="M 150 180 L 130 180 L 120 230 L 145 230 Z" class="hull-lower" />
    <path d="M 150 140 L 130 140 L 115 65 L 140 65 Z" class="hull-upper" />
    <path d="M 105 65 L 150 65 L 148 70 L 110 70 Z" class="hull-upper" />

    <path d="M 150 160 L 150 180 C 200 205, 250 215, 350 215 L 550 215 C 650 215, 730 195, 760 160 Z" class="hull-lower" />
    <path d="M 150 160 L 150 140 C 200 125, 250 125, 350 125 L 650 125 C 720 125, 750 145, 760 160 Z" class="hull-upper" />
    <path d="M 150 160 L 760 160" class="waterline" />
    
    <rect x="680" y="158" width="40" height="4" rx="2" class="details" />

    <!-- Sail & Masts -->
    <g class="sail">
      <path d="M 330 125 L 335 80 L 400 80 L 405 95 L 420 95 L 425 125 Z" class="hull-upper" />
      <rect x="390" y="85" width="4" height="4" class="details" />
      <rect x="396" y="85" width="4" height="4" class="details" />
      <rect x="345" y="60" width="2" height="20" class="details" />
      <rect x="350" y="50" width="1" height="30" class="details" />
      <rect x="365" y="45" width="3" height="35" class="details" />
      <circle cx="366" cy="45" r="3" class="details" />
      <rect x="385" y="55" width="2" height="25" class="details" />
      
      <!-- Beacon / Navigation Lights -->
      <circle cx="366" cy="42" r="2.5" fill="#ffff00" class="beacon-yellow" />
      <circle cx="370" cy="88" r="2" fill="#ffff00" opacity="0.9" />
      <circle cx="410" cy="110" r="2" fill="#ff3b30" opacity="0.9" />

      <!-- Red Star -->
      <polygon points="365,95 368,103 376,103 370,108 372,116 365,111 358,116 360,108 354,103 362,103" class="red-star" />
    </g>

    <!-- Upper Deck hatches/details -->
    <g class="details" opacity="0.85">
      <rect x="460" y="124" width="8" height="2" /><rect x="475" y="124" width="8" height="2" />
      <rect x="490" y="124" width="8" height="2" /><rect x="505" y="124" width="8" height="2" />
      <rect x="520" y="124" width="8" height="2" /><rect x="535" y="124" width="8" height="2" />
      <rect x="550" y="124" width="8" height="2" /><rect x="565" y="124" width="8" height="2" />
      <rect x="580" y="124" width="8" height="2" /><rect x="595" y="124" width="8" height="2" />
    </g>
    
    <!-- Hull Panel Lines -->
    <g fill="none" stroke="#0e1012" stroke-width="1.2" opacity="0.4">
      <line x1="250" y1="125" x2="250" y2="160" />
      <line x1="300" y1="125" x2="300" y2="160" />
      <line x1="450" y1="125" x2="450" y2="160" />
      <line x1="650" y1="125" x2="650" y2="160" />
      <line x1="720" y1="133" x2="720" y2="160" />
    </g>
  </g>
</svg>