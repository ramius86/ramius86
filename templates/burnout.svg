<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <!-- Ocean Depths Background (Magma Red Alert) -->
    <linearGradient id="ocean-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#260202" />
      <stop offset="30%" stop-color="#1c0101" />
      <stop offset="70%" stop-color="#090000" />
      <stop offset="100%" stop-color="#020000" />
    </linearGradient>

    <!-- Top Glow Overlay (Intense Crimson) -->
    <radialGradient id="light-glow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ff3333" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>

    <!-- God Rays (Red emergency lights) -->
    <linearGradient id="god-ray-1" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ba2a2a" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#ba2a2a" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="god-ray-2" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#7a1414" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#7a1414" stop-opacity="0" />
    </linearGradient>

    <!-- Sleek Blueprint Grid Pattern (Red Alert) -->
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#ff3333" stroke-width="0.5" opacity="0.04" />
      <circle cx="0" cy="0" r="0.75" fill="#ff3333" opacity="0.1" />
    </pattern>

    <!-- Propeller Metallic Gradient -->
    <linearGradient id="prop-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#edd282" />
      <stop offset="50%" stop-color="#c4a747" />
      <stop offset="100%" stop-color="#735b18" />
    </linearGradient>

    <!-- Volumetric Gradients (Red Emergency Steel) -->
    <linearGradient id="hull-upper-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3d1d1d" />
      <stop offset="40%" stop-color="#240f0f" />
      <stop offset="100%" stop-color="#140606" />
    </linearGradient>
    
    <linearGradient id="hull-lower-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8c2e26" />
      <stop offset="40%" stop-color="#5e1b15" />
      <stop offset="100%" stop-color="#300a06" />
    </linearGradient>
    
    <linearGradient id="hull-transition-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#240f0f" />
      <stop offset="50%" stop-color="#140606" />
      <stop offset="50.1%" stop-color="#5e1b15" />
      <stop offset="100%" stop-color="#300a06" />
    </linearGradient>

    <filter id="blur-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .hull-upper { fill: url(#hull-upper-grad); stroke: #ff3333; stroke-width: 0.5; stroke-opacity: 0.25; }
    .hull-lower { fill: url(#hull-lower-grad); stroke: #ff3333; stroke-width: 0.5; stroke-opacity: 0.25; }
    .hull-transition { fill: url(#hull-transition-grad); }
    .waterline { stroke: #ff3333; stroke-width: 1.5; stroke-opacity: 0.8; }
    
    .propeller { fill: url(#prop-grad); transform-origin: 80px 160px; animation: prop-spin 0.5s linear infinite; }
    .details { fill: #180505; }
    .red-star { fill: #ff0000; filter: url(#blur-glow); }
    
    .text-main { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 15px; fill: #ff4a4a; font-weight: 800; letter-spacing: 1.5px; }
    .text-red { fill: #ff0000; }
    .text-sub { font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace; font-size: 10px; fill: #ff6666; opacity: 0.8; letter-spacing: 0.5px; }
    .hud-label { font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace; font-size: 8px; fill: #ff4a4a; }

    @keyframes prop-spin { 0% { transform: scaleY(1); } 50% { transform: scaleY(-1); } 100% { transform: scaleY(1); } }
    @keyframes prop-flicker { 0% { opacity: 0.25; } 100% { opacity: 0.55; } }
    @keyframes sway-1 { 0%, 100% { transform: skewX(-5deg) scaleX(0.93); } 50% { transform: skewX(5deg) scaleX(1.07); } }
    @keyframes sway-2 { 0%, 100% { transform: skewX(4deg) scaleX(1.1); } 50% { transform: skewX(-4deg) scaleX(0.9); } }
    
    /* Violent shaking bob */
    @keyframes bob { 0%, 100% { transform: translateY(0px) rotate(0deg); } 25% { transform: translateY(-4px) rotate(-0.3deg); } 50% { transform: translateY(1px) rotate(0.1deg); } 75% { transform: translateY(-3px) rotate(-0.2deg); } }
    @keyframes drift { 0% { transform: translate(0, 0); opacity: 0; } 15% { opacity: 0.4; } 85% { opacity: 0.4; } 100% { transform: translate(-150px, -50px); opacity: 0; } }
    @keyframes radar { 0% { r: 10; opacity: 0.9; stroke-width: 4; } 100% { r: 280; opacity: 0; stroke-width: 0.5; } }
    
    /* High velocity bubble drift */
    @keyframes bubble-drift-1 { 0% { transform: translate(0, 0) scale(0.5); opacity: 0; } 15% { opacity: 0.8; } 80% { opacity: 0.7; } 100% { transform: translate(-300px, -24px) scale(2.5); opacity: 0; } }
    @keyframes bubble-drift-2 { 0% { transform: translate(0, 0) scale(0.5); opacity: 0; } 10% { opacity: 0.9; } 85% { opacity: 0.8; } 100% { transform: translate(-330px, 18px) scale(3.0); opacity: 0; } }
    @keyframes bubble-drift-3 { 0% { transform: translate(0, 0) scale(0.4); opacity: 0; } 20% { opacity: 0.7; } 75% { opacity: 0.6; } 100% { transform: translate(-250px, -6px) scale(2.0); opacity: 0; } }
    @keyframes ripple { 0% { transform: scale(0.95); opacity: 0.05; } 50% { opacity: 0.45; } 100% { transform: scale(1.05); opacity: 0; } }
    
    @keyframes blink-fast { 0%, 100% { opacity: 0.15; } 50% { opacity: 1; } }
    @keyframes pulse-vignette { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.45; } }
    @keyframes scanline-flicker { 0%, 100% { opacity: 0.05; } 50% { opacity: 0.25; } }

    @keyframes shark-swim-fast-1 { 0% { transform: translate(-150px, 240px) scaleX(-1); opacity: 0; } 10% { opacity: 0.5; } 90% { opacity: 0.5; } 100% { transform: translate(900px, 270px) scaleX(-1); opacity: 0; } }
    @keyframes shark-swim-fast-2 { 0% { transform: translate(900px, 210px) scaleX(1); opacity: 0; } 15% { opacity: 0.4; } 85% { opacity: 0.4; } 100% { transform: translate(-150px, 230px) scaleX(1); opacity: 0; } }
    @keyframes shark-wiggle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

    .ray-1 { transform-origin: 200px 0px; animation: sway-1 8s infinite ease-in-out; }
    .ray-2 { transform-origin: 500px 0px; animation: sway-2 6s infinite ease-in-out; }
    .sub { transform-origin: 400px 200px; animation: bob 4s infinite ease-in-out; }
    
    .bubble { fill: none; stroke: #ff3333; stroke-width: 0.8; fill-opacity: 0.15; filter: url(#blur-glow); }
    .bubble-1 { animation: bubble-drift-1 0.7s infinite linear; }
    .bubble-2 { animation: bubble-drift-2 0.8s infinite linear; }
    .bubble-3 { animation: bubble-drift-3 0.6s infinite linear; }
    
    .mote { fill: #ff6666; opacity: 0; animation: drift 6s infinite linear; }
    .sonar-ping { fill: none; stroke: #ff3333; transform-origin: 750px 160px; animation: radar 2.5s infinite ease-out; }
    .vignette { stroke: #ff3333; stroke-width: 3.5; fill: none; animation: pulse-vignette 1.2s infinite ease-in-out; }
    .scanline { stroke: #ff3333; stroke-width: 0.5; opacity: 0.15; animation: scanline-flicker 0.15s infinite; }
    .bow-wave { fill: none; stroke: #ff3333; stroke-width: 1.5; transform-origin: 760px 160px; animation: ripple 1.2s infinite ease-out; filter: url(#blur-glow); }
    
    .beacon-red { animation: blink-fast 0.4s infinite; }
    .beacon-red-glow { animation: blink-fast 0.4s infinite; }

    .shark-container-1 .shark { animation: shark-wiggle 1.2s infinite ease-in-out; }
    .shark-container-2 .shark { animation: shark-wiggle 1.5s infinite ease-in-out; }
    .shark-container-1 { animation: shark-swim-fast-1 7s infinite linear; }
    .shark-container-2 { animation: shark-swim-fast-2 8s infinite linear; }
  </style>

  <!-- Ocean Background -->
  <rect width="100%" height="100%" fill="url(#ocean-bg)" />
  <rect width="100%" height="100%" fill="url(#light-glow)" />

  <!-- Blueprint Grid -->
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Shimmering Emergency God Rays -->
  <g>
    <polygon points="80,-50 250,-50 450,500 50,500" fill="url(#god-ray-1)" class="ray-1" />
    <polygon points="350,-50 500,-50 800,500 400,500" fill="url(#god-ray-2)" class="ray-2" />
  </g>

  <!-- Digital Glitch Scan Lines -->
  <line x1="0" y1="90" x2="800" y2="90" class="scanline" />
  <line x1="0" y1="310" x2="800" y2="310" class="scanline" style="animation-delay: 0.08s;" />

  <!-- Floating Marine Snow (Red) -->
  <circle cx="315" cy="386" r="1.3" class="mote" style="animation-delay: 1.4s; animation-duration: 5.6s;" />
  <circle cx="277" cy="137" r="0.8" class="mote" style="animation-delay: 0.6s; animation-duration: 7.6s;" />
  <circle cx="297" cy="305" r="1.3" class="mote" style="animation-delay: 2.2s; animation-duration: 4.2s;" />
  <circle cx="697" cy="363" r="1.3" class="mote" style="animation-delay: 0.2s; animation-duration: 6.3s;" />
  <circle cx="43"  cy="240" r="1.2" class="mote" style="animation-delay: 1.8s; animation-duration: 4.5s;" />
  <circle cx="739" cy="285" r="1.5" class="mote" style="animation-delay: 0.9s; animation-duration: 5.0s;" />

  <!-- Fast Leaping/Circling Predator Sharks -->
  <g class="shark-container-1">
    <g class="shark">
      <path d="M 0 0 C 15 -8, 25 -5, 35 -10 L 32 -3 C 42 0, 48 -5, 52 -10 L 51 0 L 54 8 L 47 3 C 43 5, 35 3, 28 6 L 25 12 L 20 5 C 10 5, 5 3, 0 0 Z" fill="#ff3333" fill-opacity="0.35" />
      <circle cx="6" cy="-2" r="0.6" fill="#ffffff" />
    </g>
  </g>
  <g class="shark-container-2">
    <g class="shark">
      <path d="M 0 0 C 15 -8, 25 -5, 35 -10 L 32 -3 C 42 0, 48 -5, 52 -10 L 51 0 L 54 8 L 47 3 C 43 5, 35 3, 28 6 L 25 12 L 20 5 C 10 5, 5 3, 0 0 Z" fill="#ff0000" fill-opacity="0.4" />
      <circle cx="6" cy="-2" r="0.6" fill="#ffffff" />
    </g>
  </g>

  <!-- Title Overlay -->
  <text x="30" y="40" class="text-main">TYPHOON CLASS SUBMARINE <tspan class="text-red">RED OCTOBER</tspan></text>
  <text x="30" y="58" class="text-sub">STATUS: RED ALERT / COMBAT PACE (15+ COMMITS/24H)</text>

  <!-- HUD Telemetry Panel -->
  <g class="hud-text" opacity="0.75">
    <text x="770" y="38" class="hud-label" text-anchor="end">SYS.LOC: 56.35 N, 31.48 E</text>
    <text x="770" y="52" class="hud-label" text-anchor="end">SPD: 32.8 KTS | DEPTH: 120M</text>
  </g>

  <!-- Depth Scale at the Bow (static HUD element) -->
  <g class="hud-element" opacity="0.4">
    <line x1="775" y1="120" x2="775" y2="280" stroke="#ff3333" stroke-width="0.75" />
    <line x1="771" y1="120" x2="775" y2="120" stroke="#ff3333" stroke-width="0.75" />
    <text x="766" y="123" class="hud-label" text-anchor="end">40m</text>
    
    <line x1="771" y1="160" x2="775" y2="160" stroke="#ff3333" stroke-width="0.75" />
    <text x="766" y="163" class="hud-label" text-anchor="end">80m</text>
    
    <line x1="771" y1="200" x2="775" y2="200" stroke="#ff3333" stroke-width="0.75" />
    <text x="766" y="203" class="hud-label" text-anchor="end">120m</text>
    
    <line x1="771" y1="240" x2="775" y2="240" stroke="#ff3333" stroke-width="0.75" />
    <text x="766" y="243" class="hud-label" text-anchor="end">160m</text>
    
    <line x1="771" y1="280" x2="775" y2="280" stroke="#ff3333" stroke-width="0.75" />
    <text x="766" y="283" class="hud-label" text-anchor="end">200m</text>
  </g>

  <!-- Red Alert Vignette Border -->
  <rect width="100%" height="100%" fill="none" class="vignette" />

  <!-- Submarine Main Group -->
  <g class="sub" transform="translate(10, 40)">
    <!-- Sonar ping -->
    <circle cx="750" cy="160" class="sonar-ping" />
    <circle cx="750" cy="160" class="sonar-ping" style="animation-delay: 1.25s; stroke-dasharray: 8 12;" />

    <!-- Propeller Cavitation Bubbles (Extreme Speed Turbulences) -->
    <circle cx="80" cy="159" r="1.5" class="bubble bubble-1" style="animation-delay: 0.0s;" />
    <circle cx="80" cy="161" r="2.5" class="bubble bubble-2" style="animation-delay: 0.1s;" />
    <circle cx="80" cy="158" r="2.0" class="bubble bubble-3" style="animation-delay: 0.2s;" />
    <circle cx="80" cy="160" r="3.0" class="bubble bubble-1" style="animation-delay: 0.3s;" />
    <circle cx="80" cy="162" r="1.2" class="bubble bubble-2" style="animation-delay: 0.4s;" />
    <circle cx="80" cy="159" r="2.2" class="bubble bubble-3" style="animation-delay: 0.5s;" />
    <circle cx="80" cy="161" r="2.8" class="bubble bubble-1" style="animation-delay: 0.6s;" />
    <circle cx="80" cy="158" r="1.5" class="bubble bubble-2" style="animation-delay: 0.7s;" />
    
    <!-- Hydrodynamic bow waves (Aggressive ripple) -->
    <path d="M 740 145 C 770 148, 785 155, 785 160 C 785 165, 770 172, 740 175" class="bow-wave" />
    <path d="M 745 140 C 780 145, 795 155, 795 160 C 795 165, 780 175, 745 180" class="bow-wave" style="animation-delay: 0.4s; opacity: 0.4;" />

    <!-- Depth Indicator pointer (moves dynamically with the sub's bobbing) -->
    <g>
      <polygon points="768,160 762,157 762,163" fill="#ff4a4a" />
      <line x1="762" y1="160" x2="720" y2="160" stroke="#ff4a4a" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.6" />
    </g>

    <!-- Propeller motion blur disk (Bright Red Glow) -->
    <g style="animation: prop-flicker 0.08s infinite alternate;">
      <ellipse cx="80" cy="160" rx="8" ry="26" fill="#ff3333" opacity="0.3" filter="url(#blur-glow)" />
    </g>

    <!-- Hull-to-propeller connection structure -->
    <path d="M 150 145 L 80 155 L 80 165 L 150 175 Z" class="hull-transition" />
    
    <!-- Propeller blades -->
    <g class="propeller">
      <path d="M 85 160 L 75 140 L 80 140 L 90 155 Z" />
      <path d="M 85 160 L 75 180 L 80 180 L 90 165 Z" />
      <path d="M 85 155 L 70 160 L 85 165 Z" />
    </g>

    <!-- Hull and details -->
    <path d="M 150 180 L 130 180 L 120 230 L 145 230 Z" class="hull-lower" />
    <path d="M 150 140 L 130 140 L 115 65 L 140 65 Z" class="hull-upper" />
    <path d="M 105 65 L 150 65 L 148 70 L 110 70 Z" class="hull-upper" />

    <path d="M 150 160 L 150 180 C 200 205, 250 215, 350 215 L 550 215 C 650 215, 730 195, 760 160 Z" class="hull-lower" />
    <path d="M 150 160 L 150 140 C 200 125, 250 125, 350 125 L 650 125 C 720 125, 750 145, 760 160 Z" class="hull-upper" />
    <path d="M 150 160 L 760 160" class="waterline" />
    
    <rect x="680" y="158" width="40" height="4" rx="2" class="details" />

    <!-- Sail & Masts -->
    <g class="sail">
      <path d="M 330 125 L 335 80 L 400 80 L 405 95 L 420 95 L 425 125 Z" class="hull-upper" />
      <rect x="390" y="85" width="4" height="4" class="details" />
      <rect x="396" y="85" width="4" height="4" class="details" />
      <rect x="345" y="60" width="2" height="20" class="details" />
      <rect x="350" y="50" width="1" height="30" class="details" />
      <rect x="365" y="45" width="3" height="35" class="details" />
      <circle cx="366" cy="45" r="3" class="details" />
      <rect x="385" y="55" width="2" height="25" class="details" />
      
      <!-- Beacon / Warning Navigation Lights -->
      <circle cx="366" cy="42" r="3" fill="#ff3333" class="beacon-red" />
      <circle cx="366" cy="42" r="8" fill="#ff3333" opacity="0.4" class="beacon-red-glow" filter="url(#blur-glow)" />

      <!-- Red Star -->
      <polygon points="365,95 368,103 376,103 370,108 372,116 365,111 358,116 360,108 354,103 362,103" class="red-star" />
    </g>

    <!-- Upper Deck hatches/details -->
    <g class="details" opacity="0.85">
      <rect x="460" y="124" width="8" height="2" /><rect x="475" y="124" width="8" height="2" />
      <rect x="490" y="124" width="8" height="2" /><rect x="505" y="124" width="8" height="2" />
      <rect x="520" y="124" width="8" height="2" /><rect x="535" y="124" width="8" height="2" />
      <rect x="550" y="124" width="8" height="2" /><rect x="565" y="124" width="8" height="2" />
      <rect x="580" y="124" width="8" height="2" /><rect x="595" y="124" width="8" height="2" />
    </g>
    
    <!-- Hull Panel Lines -->
    <g fill="none" stroke="#2b0000" stroke-width="1.2" opacity="0.5">
      <line x1="250" y1="125" x2="250" y2="160" />
      <line x1="300" y1="125" x2="300" y2="160" />
      <line x1="450" y1="125" x2="450" y2="160" />
      <line x1="650" y1="125" x2="650" y2="160" />
      <line x1="720" y1="133" x2="720" y2="160" />
    </g>
  </g>
</svg>