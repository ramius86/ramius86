<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <!-- Ocean Depths Background -->
    <linearGradient id="ocean-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#021122" />
      <stop offset="30%" stop-color="#010a17" />
      <stop offset="70%" stop-color="#00040a" />
      <stop offset="100%" stop-color="#000104" />
    </linearGradient>

    <!-- Top Glow Overlay -->
    <radialGradient id="light-glow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#4ac6ff" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>

    <!-- God Rays -->
    <linearGradient id="god-ray-1" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#2a8bba" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#2a8bba" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="god-ray-2" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#14587a" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#14587a" stop-opacity="0" />
    </linearGradient>

    <!-- Sleek Blueprint Grid Pattern -->
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#4ac6ff" stroke-width="0.5" opacity="0.04" />
      <circle cx="0" cy="0" r="0.75" fill="#4ac6ff" opacity="0.1" />
    </pattern>

    <!-- Propeller Metallic Gradient -->
    <linearGradient id="prop-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#edd282" />
      <stop offset="50%" stop-color="#c4a747" />
      <stop offset="100%" stop-color="#735b18" />
    </linearGradient>

    <!-- Volumetric Gradients -->
    <linearGradient id="hull-upper-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a3e42" />
      <stop offset="30%" stop-color="#25282c" />
      <stop offset="75%" stop-color="#151719" />
      <stop offset="100%" stop-color="#0b0c0d" />
    </linearGradient>
    
    <linearGradient id="hull-lower-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7a3b34" />
      <stop offset="30%" stop-color="#5c2924" />
      <stop offset="75%" stop-color="#3d1714" />
      <stop offset="100%" stop-color="#240c0a" />
    </linearGradient>
    
    <linearGradient id="hull-transition-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#25282c" />
      <stop offset="50%" stop-color="#151719" />
      <stop offset="50.1%" stop-color="#5c2924" />
      <stop offset="100%" stop-color="#3d1714" />
    </linearGradient>

    <filter id="blur-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .hull-upper { fill: url(#hull-upper-grad); stroke: #ffffff; stroke-width: 0.5; stroke-opacity: 0.12; }
    .hull-lower { fill: url(#hull-lower-grad); stroke: #ffffff; stroke-width: 0.5; stroke-opacity: 0.12; }
    .hull-transition { fill: url(#hull-transition-grad); }
    .waterline { stroke: #0e1012; stroke-width: 1.5; stroke-opacity: 0.8; }
    
    .propeller { fill: url(#prop-grad); transform-origin: 80px 160px; animation: prop-spin 2s linear infinite; }
    .details { fill: #111214; }
    .red-star { fill: #e63946; }
    
    .text-main { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 15px; fill: #4ac6ff; font-weight: 800; letter-spacing: 1.5px; }
    .text-red { fill: #ff3b30; }
    .text-sub { font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace; font-size: 10px; fill: #64b5f6; opacity: 0.8; letter-spacing: 0.5px; }
    .hud-label { font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace; font-size: 8px; fill: #4ac6ff; }

    @keyframes prop-spin { 0% { transform: scaleY(1); } 50% { transform: scaleY(-1); } 100% { transform: scaleY(1); } }
    @keyframes prop-flicker { 0% { opacity: 0.2; } 100% { opacity: 0.45; } }
    @keyframes sway-1 { 0%, 100% { transform: skewX(-4deg) scaleX(0.95); } 50% { transform: skewX(4deg) scaleX(1.05); } }
    @keyframes sway-2 { 0%, 100% { transform: skewX(3deg) scaleX(1.08); } 50% { transform: skewX(-3deg) scaleX(0.92); } }
    @keyframes bob { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-7px) rotate(-0.4deg); } }
    @keyframes drift { 0% { transform: translate(0, 0); opacity: 0; } 15% { opacity: 0.4; } 85% { opacity: 0.4; } 100% { transform: translate(-150px, -50px); opacity: 0; } }
    @keyframes radar { 0% { r: 10; opacity: 0.8; stroke-width: 3; } 100% { r: 280; opacity: 0; stroke-width: 0.5; } }
    
    @keyframes bubble-drift-1 { 0% { transform: translate(0, 0) scale(0.5); opacity: 0; } 15% { opacity: 0.7; } 80% { opacity: 0.6; } 100% { transform: translate(-240px, -18px) scale(2.2); opacity: 0; } }
    @keyframes bubble-drift-2 { 0% { transform: translate(0, 0) scale(0.5); opacity: 0; } 10% { opacity: 0.8; } 85% { opacity: 0.7; } 100% { transform: translate(-270px, 14px) scale(2.6); opacity: 0; } }
    @keyframes bubble-drift-3 { 0% { transform: translate(0, 0) scale(0.4); opacity: 0; } 20% { opacity: 0.6; } 75% { opacity: 0.5; } 100% { transform: translate(-190px, -4px) scale(1.8); opacity: 0; } }
    @keyframes ripple { 0% { transform: scale(0.96); opacity: 0.05; } 50% { opacity: 0.35; } 100% { transform: scale(1.04); opacity: 0; } }
    
    @keyframes blink-slow { 0%, 100% { opacity: 0.25; } 50% { opacity: 1; } }
    @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

    @keyframes fish-swim-1 { 0% { transform: translate(850px, 230px) scaleX(1); } 100% { transform: translate(-100px, 250px) scaleX(1); } }
    @keyframes fish-swim-2 { 0% { transform: translate(-150px, 290px) scaleX(-1); } 100% { transform: translate(900px, 310px) scaleX(-1); } }
    @keyframes fish-swim-3 { 0% { transform: translate(900px, 200px) scaleX(1); } 100% { transform: translate(-150px, 185px) scaleX(1); } }
    @keyframes fish-wiggle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

    @keyframes wave-move-1 { 0% { transform: translateX(0); } 100% { transform: translateX(-400px); } }
    @keyframes wave-move-2 { 0% { transform: translateX(0); } 100% { transform: translateX(400px); } }

    .ray-1 { transform-origin: 200px 0px; animation: sway-1 10s infinite ease-in-out; }
    .ray-2 { transform-origin: 500px 0px; animation: sway-2 8s infinite ease-in-out; }
    .ray-3 { transform-origin: 700px 0px; animation: sway-1 12s infinite ease-in-out; opacity: 0.6; }
    .sub { transform-origin: 400px 200px; animation: bob 9s infinite ease-in-out; }
    
    .bubble { fill: none; stroke: #00f0ff; stroke-width: 0.75; fill-opacity: 0.12; filter: url(#blur-glow); }
    .bubble-1 { animation: bubble-drift-1 infinite linear; }
    .bubble-2 { animation: bubble-drift-2 infinite linear; }
    .bubble-3 { animation: bubble-drift-3 infinite linear; }
    
    .mote { fill: #4ac6ff; opacity: 0; animation: drift 9s infinite linear; }
    .sonar-ping { fill: none; stroke: #00ff66; transform-origin: 750px 160px; animation: radar 3.5s infinite ease-out; }
    .bow-wave { fill: none; stroke: #00f0ff; stroke-width: 1.5; transform-origin: 760px 160px; animation: ripple 2s infinite ease-out; filter: url(#blur-glow); }
    .beacon-green { animation: blink-slow 2s infinite; }

    .fish-container-1 .fish { animation: fish-wiggle 1.6s infinite ease-in-out; }
    .fish-container-2 .fish { animation: fish-wiggle 2.0s infinite ease-in-out; }
    .fish-container-3 .fish { animation: fish-wiggle 1.8s infinite ease-in-out; }
    .fish-container-1 { animation: fish-swim-1 14s infinite linear; }
    .fish-container-2 { animation: fish-swim-2 18s infinite linear; }
    .fish-container-3 { animation: fish-swim-3 16s infinite linear; }

    .wave-1 { animation: wave-move-1 20s infinite linear; }
    .wave-2 { animation: wave-move-2 25s infinite linear; }
  </style>

  <!-- Ocean Background -->
  <rect width="100%" height="100%" fill="url(#ocean-bg)" />
  <rect width="100%" height="100%" fill="url(#light-glow)" />

  <!-- Undulating Sea Surface Waves (Top) -->
  <g opacity="0.08">
    <path d="M 0 25 Q 100 15, 200 25 T 400 25 T 600 25 T 800 25 L 800 0 L 0 0 Z" fill="#4ac6ff" class="wave-1" />
    <path d="M 0 20 Q 120 28, 240 20 T 480 20 T 720 20 T 800 20 L 800 0 L 0 0 Z" fill="#4ac6ff" class="wave-2" />
  </g>

  <!-- Blueprint Grid -->
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Shimmering God Rays -->
  <g>
    <polygon points="80,-50 250,-50 450,500 50,500" fill="url(#god-ray-1)" class="ray-1" />
    <polygon points="350,-50 500,-50 800,500 400,500" fill="url(#god-ray-2)" class="ray-2" />
    <polygon points="550,-50 650,-50 950,500 700,500" fill="url(#god-ray-1)" class="ray-3" />
  </g>

  <!-- Floating Marine Snow -->
  <circle cx="315" cy="386" r="1.3" class="mote" style="animation-delay: 7.4s; animation-duration: 11.6s;" />
  <circle cx="277" cy="137" r="0.8" class="mote" style="animation-delay: 4.6s; animation-duration: 15.6s;" />
  <circle cx="297" cy="305" r="1.3" class="mote" style="animation-delay: 1.2s; animation-duration: 8.2s;" />
  <circle cx="697" cy="363" r="1.3" class="mote" style="animation-delay: 0.6s; animation-duration: 12.3s;" />
  <circle cx="43"  cy="240" r="1.2" class="mote" style="animation-delay: 3.8s; animation-duration: 8.5s;" />
  <circle cx="739" cy="285" r="1.5" class="mote" style="animation-delay: 2.5s; animation-duration: 9.0s;" />
  <circle cx="631" cy="193" r="0.7" class="mote" style="animation-delay: 4.6s; animation-duration: 12.2s;" />
  <circle cx="790" cy="51"  r="1.2" class="mote" style="animation-delay: 5.9s; animation-duration: 9.7s;" />

  <!-- Swimming Fish (Parallax Foreground/Background) -->
  <g class="fish-container-1">
    <g class="fish">
      <path d="M 0 0 C 8 -3, 12 -2, 16 -5 L 17 -1 L 19 -3 L 19 3 L 17 1 L 16 5 C 12 2, 8 3, 0 0 Z" fill="#38a0d4" />
      <circle cx="3" cy="-1" r="0.5" fill="#ffffff" />
    </g>
  </g>
  <g class="fish-container-2">
    <g class="fish">
      <path d="M 0 0 C 8 -3, 12 -2, 16 -5 L 17 -1 L 19 -3 L 19 3 L 17 1 L 16 5 C 12 2, 8 3, 0 0 Z" fill="#2a8bba" />
      <circle cx="3" cy="-1" r="0.5" fill="#ffffff" />
    </g>
  </g>
  <g class="fish-container-3">
    <g class="fish">
      <path d="M 0 0 C 8 -3, 12 -2, 16 -5 L 17 -1 L 19 -3 L 19 3 L 17 1 L 16 5 C 12 2, 8 3, 0 0 Z" fill="#4ac6ff" opacity="0.8" />
      <circle cx="3" cy="-1" r="0.5" fill="#ffffff" />
    </g>
  </g>

  <!-- Title Overlay -->
  <text x="30" y="40" class="text-main">TYPHOON CLASS SUBMARINE <tspan class="text-red">RED OCTOBER</tspan></text>
  <text x="30" y="58" class="text-sub">STATUS: STANDARD ROUTE / ACTIVE PATROL (PUSH &lt; 24H)</text>

  <!-- HUD Telemetry Panel -->
  <g class="hud-text" opacity="0.6">
    <text x="770" y="38" class="hud-label" text-anchor="end">SYS.LOC: 56.32 N, 31.42 E</text>
    <text x="770" y="52" class="hud-label" text-anchor="end">SPD: 14.5 KTS | DEPTH: 180M</text>
  </g>

  <!-- Depth Scale at the Bow (static HUD element) -->
  <g class="hud-element" opacity="0.35">
    <line x1="775" y1="120" x2="775" y2="280" stroke="#4ac6ff" stroke-width="0.75" />
    <line x1="771" y1="120" x2="775" y2="120" stroke="#4ac6ff" stroke-width="0.75" />
    <text x="766" y="123" class="hud-label" text-anchor="end">100m</text>
    
    <line x1="771" y1="160" x2="775" y2="160" stroke="#4ac6ff" stroke-width="0.75" />
    <text x="766" y="163" class="hud-label" text-anchor="end">140m</text>
    
    <line x1="771" y1="200" x2="775" y2="200" stroke="#4ac6ff" stroke-width="0.75" />
    <text x="766" y="203" class="hud-label" text-anchor="end">180m</text>
    
    <line x1="771" y1="240" x2="775" y2="240" stroke="#4ac6ff" stroke-width="0.75" />
    <text x="766" y="243" class="hud-label" text-anchor="end">220m</text>
    
    <line x1="771" y1="280" x2="775" y2="280" stroke="#4ac6ff" stroke-width="0.75" />
    <text x="766" y="283" class="hud-label" text-anchor="end">260m</text>
  </g>

  <!-- Submarine Main Group -->
  <g class="sub" transform="translate(10, 40)">
    <!-- Sonar ping -->
    <circle cx="750" cy="160" class="sonar-ping" />
    <circle cx="750" cy="160" class="sonar-ping" style="animation-delay: 1.75s; stroke-dasharray: 8 12;" />

    <!-- Propeller Cavitation Bubbles (Hand-crafted Stream) -->
    <circle cx="80" cy="159" r="1.2" class="bubble bubble-1" style="animation-delay: 0.0s; animation-duration: 1.4s;" />
    <circle cx="80" cy="161" r="2.0" class="bubble bubble-2" style="animation-delay: 0.15s; animation-duration: 1.6s;" />
    <circle cx="80" cy="158" r="1.5" class="bubble bubble-3" style="animation-delay: 0.3s; animation-duration: 1.3s;" />
    <circle cx="80" cy="160" r="2.4" class="bubble bubble-1" style="animation-delay: 0.45s; animation-duration: 1.5s;" />
    <circle cx="80" cy="162" r="1.0" class="bubble bubble-2" style="animation-delay: 0.6s; animation-duration: 1.7s;" />
    <circle cx="80" cy="159" r="1.8" class="bubble bubble-3" style="animation-delay: 0.75s; animation-duration: 1.2s;" />
    <circle cx="80" cy="161" r="2.2" class="bubble bubble-1" style="animation-delay: 0.9s; animation-duration: 1.6s;" />
    <circle cx="80" cy="158" r="1.3" class="bubble bubble-2" style="animation-delay: 1.05s; animation-duration: 1.4s;" />
    <circle cx="80" cy="160" r="1.6" class="bubble bubble-3" style="animation-delay: 1.2s; animation-duration: 1.5s;" />
    <circle cx="80" cy="162" r="2.1" class="bubble bubble-1" style="animation-delay: 1.35s; animation-duration: 1.3s;" />
    
    <!-- Hydrodynamic bow waves -->
    <path d="M 740 145 C 770 148, 785 155, 785 160 C 785 165, 770 172, 740 175" class="bow-wave" />
    <path d="M 745 140 C 780 145, 795 155, 795 160 C 795 165, 780 175, 745 180" class="bow-wave" style="animation-delay: 0.6s; opacity: 0.3;" />

    <!-- Depth Indicator pointer (moves dynamically with the sub's bobbing) -->
    <g>
      <polygon points="768,160 762,157 762,163" fill="#4ac6ff" />
      <line x1="762" y1="160" x2="720" y2="160" stroke="#4ac6ff" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.6" />
    </g>

    <!-- Propeller motion blur disk -->
    <g style="animation: prop-flicker 0.12s infinite alternate;">
      <ellipse cx="80" cy="160" rx="6" ry="24" fill="url(#prop-grad)" opacity="0.2" filter="url(#blur-glow)" />
    </g>

    <!-- Hull-to-propeller connection structure -->
    <path d="M 150 145 L 80 155 L 80 165 L 150 175 Z" class="hull-transition" />
    
    <!-- Propeller blades -->
    <g class="propeller">
      <path d="M 85 160 L 75 140 L 80 140 L 90 155 Z" />
      <path d="M 85 160 L 75 180 L 80 180 L 90 165 Z" />
      <path d="M 85 155 L 70 160 L 85 165 Z" />
    </g>

    <!-- Hull and details -->
    <path d="M 150 180 L 130 180 L 120 230 L 145 230 Z" class="hull-lower" />
    <path d="M 150 140 L 130 140 L 115 65 L 140 65 Z" class="hull-upper" />
    <path d="M 105 65 L 150 65 L 148 70 L 110 70 Z" class="hull-upper" />

    <path d="M 150 160 L 150 180 C 200 205, 250 215, 350 215 L 550 215 C 650 215, 730 195, 760 160 Z" class="hull-lower" />
    <path d="M 150 160 L 150 140 C 200 125, 250 125, 350 125 L 650 125 C 720 125, 750 145, 760 160 Z" class="hull-upper" />
    <path d="M 150 160 L 760 160" class="waterline" />
    
    <rect x="680" y="158" width="40" height="4" rx="2" class="details" />

    <!-- Sail & Masts -->
    <g class="sail">
      <path d="M 330 125 L 335 80 L 400 80 L 405 95 L 420 95 L 425 125 Z" class="hull-upper" />
      <rect x="390" y="85" width="4" height="4" class="details" />
      <rect x="396" y="85" width="4" height="4" class="details" />
      <rect x="345" y="60" width="2" height="20" class="details" />
      <rect x="350" y="50" width="1" height="30" class="details" />
      <rect x="365" y="45" width="3" height="35" class="details" />
      <circle cx="366" cy="45" r="3" class="details" />
      <rect x="385" y="55" width="2" height="25" class="details" />
      
      <!-- Beacon / Navigation Lights -->
      <circle cx="366" cy="42" r="2.5" fill="#00ff66" class="beacon-green" />

      <!-- Red Star -->
      <polygon points="365,95 368,103 376,103 370,108 372,116 365,111 358,116 360,108 354,103 362,103" class="red-star" />
    </g>

    <!-- Upper Deck hatches/details -->
    <g class="details" opacity="0.85">
      <rect x="460" y="124" width="8" height="2" /><rect x="475" y="124" width="8" height="2" />
      <rect x="490" y="124" width="8" height="2" /><rect x="505" y="124" width="8" height="2" />
      <rect x="520" y="124" width="8" height="2" /><rect x="535" y="124" width="8" height="2" />
      <rect x="550" y="124" width="8" height="2" /><rect x="565" y="124" width="8" height="2" />
      <rect x="580" y="124" width="8" height="2" /><rect x="595" y="124" width="8" height="2" />
    </g>
    
    <!-- Hull Panel Lines -->
    <g fill="none" stroke="#111215" stroke-width="1.2" opacity="0.4">
      <line x1="250" y1="125" x2="250" y2="160" />
      <line x1="300" y1="125" x2="300" y2="160" />
      <line x1="450" y1="125" x2="450" y2="160" />
      <line x1="650" y1="125" x2="650" y2="160" />
      <line x1="720" y1="133" x2="720" y2="160" />
    </g>
  </g>
</svg>