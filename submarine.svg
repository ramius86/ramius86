<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <!-- Ocean Depths Background (Deeper and Darker) -->
    <linearGradient id="ocean-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#010a17" />
      <stop offset="40%" stop-color="#00040e" />
      <stop offset="80%" stop-color="#000105" />
      <stop offset="100%" stop-color="#000002" />
    </linearGradient>

    <!-- Top Glow Overlay (Very Dim) -->
    <radialGradient id="light-glow" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#2a8bba" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>

    <!-- Dim God Rays -->
    <linearGradient id="god-ray-1" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#14587a" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#14587a" stop-opacity="0" />
    </linearGradient>

    <!-- Sleek Blueprint Grid Pattern -->
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#2a8bba" stroke-width="0.5" opacity="0.025" />
      <circle cx="0" cy="0" r="0.75" fill="#2a8bba" opacity="0.06" />
    </pattern>

    <!-- Propeller Metallic Gradient -->
    <linearGradient id="prop-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d9be6f" />
      <stop offset="50%" stop-color="#b59a41" />
      <stop offset="100%" stop-color="#695318" />
    </linearGradient>

    <!-- Volumetric Gradients -->
    <linearGradient id="hull-upper-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34383c" />
      <stop offset="30%" stop-color="#202226" />
      <stop offset="75%" stop-color="#121316" />
      <stop offset="100%" stop-color="#070809" />
    </linearGradient>
    
    <linearGradient id="hull-lower-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#703630" />
      <stop offset="30%" stop-color="#542521" />
      <stop offset="75%" stop-color="#381512" />
      <stop offset="100%" stop-color="#200a08" />
    </linearGradient>
    
    <linearGradient id="hull-transition-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#202226" />
      <stop offset="50%" stop-color="#121316" />
      <stop offset="50.1%" stop-color="#542521" />
      <stop offset="100%" stop-color="#381512" />
    </linearGradient>

    <filter id="blur-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .hull-upper { fill: url(#hull-upper-grad); stroke: #ffffff; stroke-width: 0.5; stroke-opacity: 0.08; }
    .hull-lower { fill: url(#hull-lower-grad); stroke: #ffffff; stroke-width: 0.5; stroke-opacity: 0.08; }
    .hull-transition { fill: url(#hull-transition-grad); }
    .waterline { stroke: #08090a; stroke-width: 1.5; stroke-opacity: 0.7; }
    
    .propeller { fill: url(#prop-grad); transform-origin: 80px 160px; animation: prop-spin 6s linear infinite; }
    .details { fill: #0b0c0d; }
    .red-star { fill: #bd2a35; }
    
    .text-main { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 15px; fill: #2a8bba; font-weight: 800; letter-spacing: 1.5px; }
    .text-red { fill: #bd2a35; }
    .text-sub { font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace; font-size: 10px; fill: #1c5e7e; opacity: 0.8; letter-spacing: 0.5px; }
    .hud-label { font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace; font-size: 8px; fill: #2a8bba; }

    @keyframes prop-spin { 0% { transform: scaleY(1); } 50% { transform: scaleY(-1); } 100% { transform: scaleY(1); } }
    @keyframes prop-flicker { 0% { opacity: 0.1; } 100% { opacity: 0.25; } }
    @keyframes sway-1 { 0%, 100% { transform: skewX(-2deg) scaleX(0.97); } 50% { transform: skewX(2deg) scaleX(1.03); } }
    @keyframes bob { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-5px) rotate(-0.2deg); } }
    @keyframes drift { 0% { transform: translate(0, 0); opacity: 0; } 15% { opacity: 0.3; } 85% { opacity: 0.3; } 100% { transform: translate(-100px, -40px); opacity: 0; } }

    /* Jellyfish animations */
    @keyframes jelly-pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(0.9, 1.1) translateY(-3px); } }
    @keyframes jelly-float-1 { 0% { transform: translate(250px, 450px); opacity: 0; } 10% { opacity: 0.4; } 90% { opacity: 0.4; } 100% { transform: translate(210px, -60px); opacity: 0; } }
    @keyframes jelly-float-2 { 0% { transform: translate(650px, 450px); opacity: 0; } 15% { opacity: 0.3; } 85% { opacity: 0.3; } 100% { transform: translate(680px, -60px); opacity: 0; } }
    
    /* Music notes drift */
    @keyframes note-drift-1 {
      0% { transform: translate(370px, 70px) scale(0.5) rotate(0deg); opacity: 0; }
      20% { opacity: 0.7; }
      80% { opacity: 0.7; }
      100% { transform: translate(300px, -20px) scale(1.1) rotate(-20deg); opacity: 0; }
    }
    @keyframes note-drift-2 {
      0% { transform: translate(385px, 80px) scale(0.4) rotate(0deg); opacity: 0; }
      25% { opacity: 0.6; }
      80% { opacity: 0.6; }
      100% { transform: translate(340px, -10px) scale(0.9) rotate(15deg); opacity: 0; }
    }

    .ray-1 { transform-origin: 200px 0px; animation: sway-1 12s infinite ease-in-out; }
    .sub { transform-origin: 400px 200px; animation: bob 12s infinite ease-in-out; }
    .mote { fill: #2a8bba; opacity: 0; animation: drift 14s infinite linear; }
    
    .jelly-body { animation: jelly-pulse 4s infinite ease-in-out; }
    .jelly-1 { animation: jelly-float-1 28s infinite linear; }
    .jelly-2 { animation: jelly-float-2 35s infinite linear; }

    .music-note-1 { animation: note-drift-1 7s infinite linear; }
    .music-note-2 { animation: note-drift-2 9s infinite linear; style="animation-delay: 2.5s;" }
  </style>

  <!-- Ocean Background -->
  <rect width="100%" height="100%" fill="url(#ocean-bg)" />
  <rect width="100%" height="100%" fill="url(#light-glow)" />

  <!-- Blueprint Grid -->
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Shimmering God Ray -->
  <g>
    <polygon points="80,-50 250,-50 450,500 50,500" fill="url(#god-ray-1)" class="ray-1" />
  </g>

  <!-- Slowly Drifting Marine Snow (Extra Count) -->
  <circle cx="150" cy="180" r="1.0" class="mote" style="animation-delay: 0s; animation-duration: 12s;" />
  <circle cx="350" cy="80"  r="0.7" class="mote" style="animation-delay: 2s; animation-duration: 16s;" />
  <circle cx="550" cy="320" r="1.2" class="mote" style="animation-delay: 4s; animation-duration: 14s;" />
  <circle cx="720" cy="220" r="0.8" class="mote" style="animation-delay: 1s; animation-duration: 18s;" />
  <circle cx="80"  cy="290" r="1.1" class="mote" style="animation-delay: 6s; animation-duration: 13s;" />
  <circle cx="620" cy="110" r="0.6" class="mote" style="animation-delay: 8s; animation-duration: 19s;" />
  <circle cx="480" cy="380" r="1.3" class="mote" style="animation-delay: 3s; animation-duration: 15s;" />
  <circle cx="280" cy="250" r="0.8" class="mote" style="animation-delay: 5s; animation-duration: 17s;" />
  <circle cx="680" cy="50"  r="1.0" class="mote" style="animation-delay: 7s; animation-duration: 14s;" />
  <circle cx="220" cy="390" r="0.5" class="mote" style="animation-delay: 9s; animation-duration: 21s;" />

  <!-- Slowly Floating Jellyfish -->
  <g class="jelly-1">
    <g class="jelly-body">
      <!-- Bell -->
      <path d="M -10 0 C -10 -12, 10 -12, 10 0 C 8 -3, -8 -3, -10 0 Z" fill="#4ac6ff" fill-opacity="0.3" stroke="#4ac6ff" stroke-width="0.5" stroke-opacity="0.5" />
      <!-- Tentacles -->
      <path d="M -6 0 C -7 8, -9 15, -7 22" fill="none" stroke="#4ac6ff" stroke-width="0.5" stroke-opacity="0.4" />
      <path d="M 0 0 C 1 9, -1 18, 0 25" fill="none" stroke="#4ac6ff" stroke-width="0.5" stroke-opacity="0.4" />
      <path d="M 6 0 C 5 8, 7 15, 5 22" fill="none" stroke="#4ac6ff" stroke-width="0.5" stroke-opacity="0.4" />
    </g>
  </g>
  <g class="jelly-2">
    <g class="jelly-body">
      <!-- Bell -->
      <path d="M -8 0 C -8 -10, 8 -10, 8 0 C 6 -2, -6 -2, -8 0 Z" fill="#2a8bba" fill-opacity="0.25" stroke="#2a8bba" stroke-width="0.5" stroke-opacity="0.4" />
      <!-- Tentacles -->
      <path d="M -5 0 C -6 7, -8 13, -6 18" fill="none" stroke="#2a8bba" stroke-width="0.5" stroke-opacity="0.3" />
      <path d="M 0 0 C 1 8, -1 15, 0 20" fill="none" stroke="#2a8bba" stroke-width="0.5" stroke-opacity="0.3" />
      <path d="M 5 0 C 4 7, 6 13, 4 18" fill="none" stroke="#2a8bba" stroke-width="0.5" stroke-opacity="0.3" />
    </g>
  </g>

  <!-- Title Overlay -->
  <text x="30" y="40" class="text-main">TYPHOON CLASS SUBMARINE <tspan class="text-red">RED OCTOBER</tspan></text>
  <text x="30" y="58" class="text-sub">STATUS: SILENT RUNNING / DEEP DIVE (PUSH &gt; 24H)</text>

  <!-- HUD Telemetry Panel -->
  <g class="hud-text" opacity="0.5">
    <text x="770" y="38" class="hud-label" text-anchor="end">SYS.LOC: 56.30 N, 31.39 E</text>
    <text x="770" y="52" class="hud-label" text-anchor="end">SPD: 4.2 KTS | DEPTH: 380M</text>
  </g>

  <!-- Depth Scale at the Bow (static HUD element) -->
  <g class="hud-element" opacity="0.25">
    <line x1="775" y1="120" x2="775" y2="280" stroke="#2a8bba" stroke-width="0.75" />
    <line x1="771" y1="120" x2="775" y2="120" stroke="#2a8bba" stroke-width="0.75" />
    <text x="766" y="123" class="hud-label" text-anchor="end">300m</text>
    
    <line x1="771" y1="160" x2="775" y2="160" stroke="#2a8bba" stroke-width="0.75" />
    <text x="766" y="163" class="hud-label" text-anchor="end">340m</text>
    
    <line x1="771" y1="200" x2="775" y2="200" stroke="#2a8bba" stroke-width="0.75" />
    <text x="766" y="203" class="hud-label" text-anchor="end">380m</text>
    
    <line x1="771" y1="240" x2="775" y2="240" stroke="#2a8bba" stroke-width="0.75" />
    <text x="766" y="243" class="hud-label" text-anchor="end">420m</text>
    
    <line x1="771" y1="280" x2="775" y2="280" stroke="#2a8bba" stroke-width="0.75" />
    <text x="766" y="283" class="hud-label" text-anchor="end">460m</text>
  </g>

  <!-- Submarine Main Group -->
  <g class="sub" transform="translate(10, 40)" opacity="0.8">
    
    <!-- Golden Music Notes Floating from Sail Mast (Russian Choir Singing) -->
    <path d="M 0 6 A 2 2 0 1 1 -2 4 A 2 2 0 0 1 0 6 L 0 0 L 5 -1 L 5 5 A 2 2 0 1 1 3 3 A 2 2 0 0 1 5 5 L 5 0 L 0 1 Z" fill="#edd282" class="music-note-1" />
    <path d="M 0 5 A 1.5 1.5 0 1 1 -1.5 3.5 A 1.5 1.5 0 0 1 0 5 L 0 0 L 4 -1 L 4 4.5 A 1.5 1.5 0 1 1 2.5 3 A 1.5 1.5 0 0 1 4 4.5 L 4 0 L 0 1 Z" fill="#edd282" class="music-note-2" style="animation-delay: 2.2s;" />

    <!-- Depth Indicator pointer (moves dynamically with the sub's bobbing) -->
    <g>
      <polygon points="768,160 762,157 762,163" fill="#2a8bba" />
      <line x1="762" y1="160" x2="720" y2="160" stroke="#2a8bba" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.5" />
    </g>

    <!-- Propeller motion blur disk (Very Faint) -->
    <g style="animation: prop-flicker 0.25s infinite alternate;">
      <ellipse cx="80" cy="160" rx="5" ry="22" fill="url(#prop-grad)" opacity="0.08" filter="url(#blur-glow)" />
    </g>

    <!-- Hull-to-propeller connection structure -->
    <path d="M 150 145 L 80 155 L 80 165 L 150 175 Z" class="hull-transition" />
    
    <!-- Propeller blades -->
    <g class="propeller">
      <path d="M 85 160 L 75 140 L 80 140 L 90 155 Z" />
      <path d="M 85 160 L 75 180 L 80 180 L 90 165 Z" />
      <path d="M 85 155 L 70 160 L 85 165 Z" />
    </g>

    <!-- Hull and details -->
    <path d="M 150 180 L 130 180 L 120 230 L 145 230 Z" class="hull-lower" />
    <path d="M 150 140 L 130 140 L 115 65 L 140 65 Z" class="hull-upper" />
    <path d="M 105 65 L 150 65 L 148 70 L 110 70 Z" class="hull-upper" />

    <path d="M 150 160 L 150 180 C 200 205, 250 215, 350 215 L 550 215 C 650 215, 730 195, 760 160 Z" class="hull-lower" />
    <path d="M 150 160 L 150 140 C 200 125, 250 125, 350 125 L 650 125 C 720 125, 750 145, 760 160 Z" class="hull-upper" />
    <path d="M 150 160 L 760 160" class="waterline" />
    
    <rect x="680" y="158" width="40" height="4" rx="2" class="details" />

    <!-- Sail & Masts -->
    <g class="sail">
      <path d="M 330 125 L 335 80 L 400 80 L 405 95 L 420 95 L 425 125 Z" class="hull-upper" />
      <rect x="390" y="85" width="4" height="4" class="details" />
      <rect x="396" y="85" width="4" height="4" class="details" />
      <rect x="345" y="60" width="2" height="20" class="details" />
      <rect x="350" y="50" width="1" height="30" class="details" />
      <rect x="365" y="45" width="3" height="35" class="details" />
      <circle cx="366" cy="45" r="3" class="details" />
      <rect x="385" y="55" width="2" height="25" class="details" />

      <!-- Red Star -->
      <polygon points="365,95 368,103 376,103 370,108 372,116 365,111 358,116 360,108 354,103 362,103" class="red-star" />
    </g>

    <!-- Upper Deck hatches/details -->
    <g class="details" opacity="0.8">
      <rect x="460" y="124" width="8" height="2" /><rect x="475" y="124" width="8" height="2" />
      <rect x="490" y="124" width="8" height="2" /><rect x="505" y="124" width="8" height="2" />
      <rect x="520" y="124" width="8" height="2" /><rect x="535" y="124" width="8" height="2" />
      <rect x="550" y="124" width="8" height="2" /><rect x="565" y="124" width="8" height="2" />
      <rect x="580" y="124" width="8" height="2" /><rect x="595" y="124" width="8" height="2" />
    </g>
    
    <!-- Hull Panel Lines -->
    <g fill="none" stroke="#070809" stroke-width="1.2" opacity="0.3">
      <line x1="250" y1="125" x2="250" y2="160" />
      <line x1="300" y1="125" x2="300" y2="160" />
      <line x1="450" y1="125" x2="450" y2="160" />
      <line x1="650" y1="125" x2="650" y2="160" />
      <line x1="720" y1="133" x2="720" y2="160" />
    </g>
  </g>
</svg>