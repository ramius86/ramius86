<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <defs>
    <!-- Gradiente oceano profondo -->
    <linearGradient id="ocean-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a1c3a" />
      <stop offset="50%" stop-color="#051024" />
      <stop offset="100%" stop-color="#020712" />
    </linearGradient>

    <!-- Gradiente scafo superiore (nero/grigio scuro titanio) -->
    <linearGradient id="hull-upper" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2d323f" />
      <stop offset="100%" stop-color="#1b1d24" />
    </linearGradient>

    <!-- Gradiente scafo inferiore (rosso ruggine sovietico) -->
    <linearGradient id="hull-lower" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a83232" />
      <stop offset="100%" stop-color="#6e1e1e" />
    </linearGradient>

    <!-- Bagliore ciano Caterpillar Drive -->
    <linearGradient id="caterpillar-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="1" />
      <stop offset="50%" stop-color="#00a2ff" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#0055ff" stop-opacity="0" />
    </linearGradient>

    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    /* Animazione oscillazione sottomarino (beccheggio lento delle correnti) */
    @keyframes submarine-float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-6px) rotate(-0.5deg); }
    }
    .sub-group {
      animation: submarine-float 6s infinite ease-in-out;
      transform-origin: 300px 200px;
    }

    /* Raggi solari filtranti dall'alto */
    @keyframes rays-shimmer {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.25; }
    }
    .sunray {
      fill: #00f0ff;
      opacity: 0.15;
      animation: rays-shimmer 4s infinite ease-in-out;
    }

    /* Pulsazione Sonar frontale */
    @keyframes sonar-ping {
      0% { r: 5; opacity: 0.8; stroke-width: 1; }
      50% { opacity: 0.4; stroke-width: 1.5; }
      100% { r: 90; opacity: 0; stroke-width: 0.5; }
    }
    .sonar-ring {
      fill: none;
      stroke: #39ff14;
      transform-origin: 105px 210px;
      animation: sonar-ping 4s infinite cubic-bezier(0.1, 0.8, 0.3, 1);
    }
    .sonar-2 { animation-delay: 2s; }

    /* Flusso Caterpillar Drive (propulsore MHD) */
    @keyframes mhd-flow {
      0% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: -30; }
    }
    .caterpillar-stream {
      stroke: #00f0ff;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 6 4 12 8;
      animation: mhd-flow 1.5s infinite linear;
      filter: url(#neon-glow);
    }
    .caterpillar-stream-2 { animation-delay: 0.7s; }

    /* Bollicine marine */
    @keyframes bubble-drift {
      0% { transform: translate(0, 0); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.4; }
      100% { transform: translate(120px, -40px); opacity: 0; }
    }
    .bubble {
      fill: none;
      stroke: #00f0ff;
      stroke-width: 0.75;
      opacity: 0;
      animation: bubble-drift 5s infinite linear;
    }
    .b-1 { animation-delay: 0s; }
    .b-2 { animation-delay: 1.8s; }
    .b-3 { animation-delay: 3.5s; }

    /* TestoSonar */
    .sonar-text {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      fill: #39ff14;
      opacity: 0.8;
      filter: url(#neon-glow);
    }
  </style>

  <!-- Oceano Sfondo -->
  <rect width="100%" height="100%" fill="url(#ocean-grad)" />

  <!-- Raggi Solari filtranti -->
  <polygon points="50,0 120,0 220,400 120,400" class="sunray" />
  <polygon points="250,0 350,0 480,400 340,400" class="sunray" style="animation-delay: 1s;" />
  <polygon points="450,0 520,0 590,400 500,400" class="sunray" style="animation-delay: 2.5s;" />

  <!-- Radar / Griglia Sonar in background soffusa -->
  <circle cx="105" cy="210" r="120" fill="none" stroke="#39ff14" stroke-width="0.25" opacity="0.15" />
  <circle cx="105" cy="210" r="200" fill="none" stroke="#39ff14" stroke-width="0.25" opacity="0.1" />
  <line x1="105" y1="210" x2="300" y2="280" stroke="#39ff14" stroke-width="0.25" opacity="0.15" />
  <line x1="105" y1="210" x2="300" y2="140" stroke="#39ff14" stroke-width="0.25" opacity="0.15" />

  <!-- Indicatori Sonar su schermo -->
  <text x="20" y="30" class="sonar-text">CONTACT: RED OCTOBER (ACTIVE)</text>
  <text x="20" y="45" class="sonar-text">PROPULSION: MHD SILENT DRIVE</text>
  <text x="20" y="60" class="sonar-text">TACTICAL: STANDARD ROUTE (PUSH &lt; 24H)</text>

  <!-- Anelli d'onda Sonar (attivi) -->
  <circle cx="105" cy="210" class="sonar-ring" />
  <circle cx="105" cy="210" class="sonar-ring sonar-2" />

  <!-- Bollicine Marine che derivano dalla scia -->
  <circle cx="485" cy="210" r="2" class="bubble b-1" />
  <circle cx="495" cy="225" r="1.5" class="bubble b-2" />
  <circle cx="480" cy="218" r="3" class="bubble b-3" />

  <!-- Gruppo Sottomarino (Soggetto Principale) -->
  <g class="sub-group">
    <!-- Scia del Caterpillar Drive (MHD Exhaust) -->
    <path d="M 470 215 H 580" class="caterpillar-stream" />
    <path d="M 470 221 H 560" class="caterpillar-stream caterpillar-stream-2" />
    
    <!-- Scafo Inferiore (Rosso) -->
    <path d="M 120 210
             C 120 232, 160 235, 180 235
             H 440
             C 455 235, 470 228, 470 220
             V 210 Z" 
          fill="url(#hull-lower)" />

    <!-- Scafo Superiore (Nero Titanio) -->
    <path d="M 105 210
             C 105 195, 140 188, 170 188
             H 445
             C 460 188, 470 198, 470 210 Z" 
          fill="url(#hull-upper)" />

    <!-- Dettagli dello scafo (Linee di pannello e portelli siluri) -->
    <line x1="125" y1="210" x2="455" y2="210" stroke="#12141a" stroke-width="1.5" opacity="0.6" />
    <!-- Linee di galleggiamento o pannelli -->
    <rect x="140" y="198" width="12" height="4" rx="1" fill="#12141a" opacity="0.8" />
    <rect x="160" y="198" width="12" height="4" rx="1" fill="#12141a" opacity="0.8" />

    <!-- Torretta di comando (Sail / Conning Tower) -->
    <path d="M 330 188
             L 345 145
             H 390
             L 395 188 Z" 
          fill="url(#hull-upper)" />
    <!-- Dettaglio Torretta (Cupola sonar e finestrini) -->
    <path d="M 345 145 Q 365 140 390 145 Z" fill="#2d323f" stroke="#1b1d24" stroke-width="1" />
    <rect x="355" y="152" width="6" height="3" fill="#12141a" />
    <rect x="365" y="152" width="6" height="3" fill="#12141a" />
    <rect x="375" y="152" width="6" height="3" fill="#12141a" />

    <!-- Timone di coda verticale (Rudder) -->
    <path d="M 445 188
             L 460 155
             H 472
             L 470 210 Z" 
          fill="url(#hull-upper)" />
    <!-- Stabilizzatori posteriori orizzontali -->
    <path d="M 455 210 L 485 214 L 485 220 L 455 215 Z" fill="url(#hull-lower)" />

    <!-- Tunnel del Caterpillar Drive (MHD Tubes laterali) -->
    <rect x="420" y="212" width="50" height="11" rx="3" fill="#111317" stroke="#2d323f" stroke-width="1" />
    <ellipse cx="470" cy="217" rx="3" ry="5.5" fill="#00f0ff" filter="url(#neon-glow)" />

    <!-- Dettaglio Simpatico e non-cringe: Il cappello da Capitano sovietico di Marko Ramius posato sulla torretta -->
    <g transform="translate(360, 131)">
      <!-- Visiera -->
      <path d="M 2 13 L 26 13 L 24 15 L 4 15 Z" fill="#111" />
      <!-- Parte superiore del cappello (bianca/nera con visiera, stile marina militare russa) -->
      <path d="M 3 13 L 0 5 Q 14 1 28 5 L 25 13 Z" fill="#1a1c23" stroke="#111" stroke-width="0.75" />
      <!-- Fascia rossa -->
      <rect x="2.5" y="10" width="22" height="3" fill="#b01e1e" />
      <!-- Emblema dorato con stella rossa al centro -->
      <circle cx="13.5" cy="7" r="2.5" fill="#ffd700" />
      <circle cx="13.5" cy="7" r="1" fill="#ff0000" />
    </g>
  </g>
</svg>
