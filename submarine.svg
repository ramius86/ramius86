<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <defs>
    <!-- Gradiente abissale nero/blu scuro -->
    <linearGradient id="ocean-abyss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#050b14" />
      <stop offset="60%" stop-color="#02050a" />
      <stop offset="100%" stop-color="#000205" />
    </linearGradient>

    <linearGradient id="hull-upper" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f222b" />
      <stop offset="100%" stop-color="#121318" />
    </linearGradient>

    <linearGradient id="hull-lower" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#692323" />
      <stop offset="100%" stop-color="#421414" />
    </linearGradient>

    <filter id="angler-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    /* Alghe marine oscillanti */
    @keyframes seaweed-sway {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(6deg); }
    }
    .seaweed {
      fill: none;
      stroke: #162a22;
      stroke-width: 3.5;
      stroke-linecap: round;
      transform-origin: bottom;
      animation: seaweed-sway 6s infinite ease-in-out;
    }
    .seaweed-2 { stroke-width: 2.5; animation-delay: 1.5s; }
    .seaweed-3 { stroke-width: 3; animation-delay: 3s; }

    /* Bolle abissali lente e rare */
    @keyframes abyss-bubbles {
      0% { transform: translate(0, 0); opacity: 0; }
      10% { opacity: 0.4; }
      90% { opacity: 0.3; }
      100% { transform: translate(-10px, -150px); opacity: 0; }
    }
    .abyss-bubble {
      fill: none;
      stroke: #39ff14;
      stroke-width: 0.5;
      opacity: 0;
      animation: abyss-bubbles 8s infinite linear;
    }
    .ab-1 { animation-delay: 0s; }
    .ab-2 { animation-delay: 4s; }

    /* Pesce lanterna abissale animato */
    @keyframes angler-swim {
      0% { transform: translate(450px, 300px) scaleX(-1); }
      50% { transform: translate(150px, 280px) scaleX(-1); }
      51% { transform: translate(150px, 280px) scaleX(1); }
      100% { transform: translate(450px, 300px) scaleX(1); }
    }
    .anglerfish {
      animation: angler-swim 18s infinite ease-in-out;
    }

    .sonar-text-lost {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      fill: #a83232;
      font-weight: bold;
      opacity: 0.85;
    }
  </style>

  <!-- Oceano Abissale -->
  <rect width="100%" height="100%" fill="url(#ocean-abyss)" />

  <!-- Indicatori Sonar Segnale Perso -->
  <text x="20" y="30" class="sonar-text-lost">CONTACT: LOST / ABYSSAL SILENCE</text>
  <text x="20" y="45" class="sonar-text-lost">STATUS: PRESUMED SUNK (NO RESPONSE)</text>
  <text x="20" y="60" class="sonar-text-lost">TACTICAL: LAURENTIAN ABYSS (IDLE &gt; 3 DAYS)</text>

  <!-- Griglia sonar statica, degradata, rossa scura -->
  <circle cx="300" cy="200" r="180" fill="none" stroke="#a83232" stroke-width="0.15" opacity="0.1" />

  <!-- Fondale Marino (Sabbia / Rocce abissali) -->
  <path d="M 0 320 Q 150 315 300 330 T 600 320 L 600 400 L 0 400 Z" fill="#040912" />
  <path d="M 0 340 Q 200 330 400 350 T 600 335 L 600 400 L 0 400 Z" fill="#02050b" />

  <!-- Alghe marine cresciute sul fondale -->
  <path d="M 120 330 Q 110 250 130 180" class="seaweed" transform="translate(0,0)" />
  <path d="M 135 330 Q 150 270 140 200" class="seaweed seaweed-2" />
  <path d="M 450 325 Q 460 260 440 210" class="seaweed seaweed-3" />
  <path d="M 470 325 Q 450 240 480 190" class="seaweed" />

  <!-- Bollicine lente dal sottomarino affondato -->
  <circle cx="360" cy="250" r="2.5" class="abyss-bubble ab-1" />
  <circle cx="365" cy="245" r="1.5" class="abyss-bubble ab-2" />

  <!-- Gruppo Sottomarino (Adagiato sul fondale e leggermente inclinato) -->
  <g transform="translate(10, 90) rotate(6)">
    <!-- Scafo Inferiore (Rosso scuro ossidato) -->
    <path d="M 120 210
             C 120 232, 160 235, 180 235
             H 440
             C 455 235, 470 228, 470 220
             V 210 Z" 
          fill="url(#hull-lower)" />

    <!-- Scafo Superiore (Nero Titanio spento) -->
    <path d="M 105 210
             C 105 195, 140 188, 170 188
             H 445
             C 460 188, 470 198, 470 210 Z" 
          fill="url(#hull-upper)" />

    <!-- Linee scafo -->
    <line x1="125" y1="210" x2="455" y2="210" stroke="#000000" stroke-width="1.5" opacity="0.8" />
    <rect x="140" y="198" width="12" height="4" rx="1" fill="#000000" opacity="0.9" />
    <rect x="160" y="198" width="12" height="4" rx="1" fill="#000000" opacity="0.9" />

    <!-- Torretta di comando -->
    <path d="M 330 188
             L 345 145
             H 390
             L 395 188 Z" 
          fill="url(#hull-upper)" />
    <!-- Finestrini spenti / neri -->
    <rect x="355" y="152" width="6" height="3" fill="#000000" />
    <rect x="365" y="152" width="6" height="3" fill="#000000" />
    <rect x="375" y="152" width="6" height="3" fill="#000000" />

    <!-- Timone di coda -->
    <path d="M 445 188
             L 460 155
             H 472
             L 470 210 Z" 
          fill="url(#hull-upper)" />
    <!-- Stabilizzatori -->
    <path d="M 455 210 L 485 214 L 485 220 L 455 215 Z" fill="url(#hull-lower)" />

    <!-- Tunnel Caterpillar (Spento, coperto d'ombra) -->
    <rect x="420" y="212" width="50" height="11" rx="3" fill="#050608" stroke="#1f222b" stroke-width="1" />
    <ellipse cx="470" cy="217" rx="3" ry="5.5" fill="#000" />

    <!-- Alghe marine cresciute sulla torretta -->
    <path d="M 370 148 Q 365 120 375 105" class="seaweed seaweed-2" stroke="#0e1b16" />

    <!-- Cappellino da Capitano sovietico: rovesciato a terra, parzialmente coperto dal fango (riferimento malinconico) -->
    <g transform="translate(240, 230) rotate(110)">
      <path d="M 2 13 L 26 13 L 24 15 L 4 15 Z" fill="#000" />
      <path d="M 3 13 L 0 5 Q 14 1 28 5 L 25 13 Z" fill="#15171d" stroke="#000" stroke-width="0.75" />
      <rect x="2.5" y="10" width="22" height="3" fill="#751717" />
      <circle cx="13.5" cy="7" r="2.5" fill="#bfa300" opacity="0.6" />
    </g>
  </g>

  <!-- Pesce Lanterna Abissale (Anglerfish) Animato -->
  <g class="anglerfish">
    <!-- Bagliore della lampadina -->
    <circle cx="110" cy="265" r="15" fill="#39ff14" fill-opacity="0.35" filter="url(#angler-glow)" />
    <!-- Lampadina -->
    <circle cx="110" cy="265" r="3" fill="#ffffff" filter="url(#angler-glow)" />
    <!-- Esca (Antenna flessibile) -->
    <path d="M 130 290 Q 115 270 110 265" fill="none" stroke="#222" stroke-width="1.5" />
    <!-- Corpo del pesce -->
    <path d="M 130 290 
             C 140 280, 160 280, 165 295 
             L 175 288 L 175 302 L 165 295
             C 160 310, 140 310, 130 300
             Z" 
          fill="#1c1f24" stroke="#2c3038" stroke-width="1" />
    <!-- Occhio spettrale -->
    <circle cx="138" cy="293" r="2" fill="#ffffff" />
    <!-- Denti affilati -->
    <polygon points="129,297 131,299 133,297 135,299" fill="#ffffff" />
  </g>
</svg>
