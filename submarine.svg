<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <!-- Ocean Depths Background (Eerie Abyssal Green) -->
    <linearGradient id="ocean-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#021c10" />
      <stop offset="35%" stop-color="#01120a" />
      <stop offset="70%" stop-color="#000704" />
      <stop offset="100%" stop-color="#000201" />
    </linearGradient>

    <!-- Top Glow Overlay (Spectral Neon Green) -->
    <radialGradient id="light-glow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#66ffb3" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>

    <!-- God Rays (Spectral Algae shimmer) -->
    <linearGradient id="god-ray-1" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#1f6e43" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#2a8bba" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="god-ray-2" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#144c2c" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#14587a" stop-opacity="0" />
    </linearGradient>

    <!-- Sleek Blueprint Grid Pattern (Spectral Green) -->
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#66ffb3" stroke-width="0.5" opacity="0.04" />
      <circle cx="0" cy="0" r="0.75" fill="#66ffb3" opacity="0.1" />
    </pattern>

    <!-- Volumetric Gradients (Ghostly Translucent) -->
    <linearGradient id="hull-upper-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#20382d" stop-opacity="0.6" />
      <stop offset="50%" stop-color="#12261c" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#08140f" stop-opacity="0.2" />
    </linearGradient>
    
    <linearGradient id="hull-lower-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a523d" stop-opacity="0.6" />
      <stop offset="50%" stop-color="#153324" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#0a1a11" stop-opacity="0.2" />
    </linearGradient>
    
    <linearGradient id="hull-transition-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#12261c" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#153324" stop-opacity="0.4" />
    </linearGradient>

    <filter id="blur-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .hull-upper { fill: url(#hull-upper-grad); stroke: #66ffb3; stroke-width: 0.5; stroke-opacity: 0.3; }
    .hull-lower { fill: url(#hull-lower-grad); stroke: #66ffb3; stroke-width: 0.5; stroke-opacity: 0.3; }
    .hull-transition { fill: url(#hull-transition-grad); }
    .waterline { stroke: #66ffb3; stroke-width: 1.5; stroke-opacity: 0.8; }
    
    .details { fill: #08140f; }
    .red-star { fill: #1f4c36; }
    
    .text-main { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 15px; fill: #66ffb3; font-weight: 800; letter-spacing: 1.5px; }
    .text-red { fill: #4ade80; }
    .text-sub { font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace; font-size: 10px; fill: #66ffb3; opacity: 0.8; letter-spacing: 0.5px; }
    .hud-label { font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace; font-size: 8px; fill: #66ffb3; }

    @keyframes sway-1 { 0%, 100% { transform: skewX(-4deg) scaleX(0.95); } 50% { transform: skewX(4deg) scaleX(1.05); } }
    @keyframes sway-2 { 0%, 100% { transform: skewX(3deg) scaleX(1.08); } 50% { transform: skewX(-3deg) scaleX(0.92); } }
    
    /* Sunken drift movement */
    @keyframes bob { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-3px) rotate(-0.15deg); } }
    @keyframes drift { 0% { transform: translate(0, 0); opacity: 0; } 15% { opacity: 0.3; } 85% { opacity: 0.3; } 100% { transform: translate(-100px, -40px); opacity: 0; } }
    
    /* Eerie floating energy */
    @keyframes ghost-float { 0% { transform: translateY(0) scale(0.8); opacity: 0; } 20% { opacity: 0.45; } 80% { opacity: 0.45; } 100% { transform: translateY(-60px) scale(1.4); opacity: 0; } }

    /* Kelp/Seaweed Swaying */
    @keyframes sway-kelp-1 { 0%, 100% { transform: skewX(-4deg); } 50% { transform: skewX(4deg); } }
    @keyframes sway-kelp-2 { 0%, 100% { transform: skewX(3deg); } 50% { transform: skewX(-3deg); } }

    /* Sunken skeleton swimming */
    @keyframes skeleton-swim-1 { 0% { transform: translate(850px, 300px) scaleX(1); } 100% { transform: translate(-100px, 320px) scaleX(1); } }
    @keyframes skeleton-swim-2 { 0% { transform: translate(-100px, 240px) scaleX(-1); } 100% { transform: translate(850px, 220px) scaleX(-1); } }

    .ray-1 { transform-origin: 200px 0px; animation: sway-1 10s infinite ease-in-out; }
    .ray-2 { transform-origin: 500px 0px; animation: sway-2 8s infinite ease-in-out; }
    .sub { transform-origin: 400px 200px; animation: bob 14s infinite ease-in-out; filter: url(#blur-glow); }
    
    .mote { fill: #66ffb3; opacity: 0; animation: drift 11s infinite linear; }
    .ghost-mote { fill: #66ffb3; opacity: 0; animation: ghost-float infinite ease-in-out; filter: url(#blur-glow); }
    
    .kelp-1 { transform-origin: 220px 400px; animation: sway-kelp-1 6s infinite ease-in-out; }
    .kelp-2 { transform-origin: 580px 400px; animation: sway-kelp-2 7s infinite ease-in-out; }
    .kelp-3 { transform-origin: 380px 400px; animation: sway-kelp-1 8s infinite ease-in-out; }

    .skeleton-container-1 { animation: skeleton-swim-1 18s infinite linear; }
    .skeleton-container-2 { animation: skeleton-swim-2 22s infinite linear; }
  </style>

  <!-- Ocean Background -->
  <rect width="100%" height="100%" fill="url(#ocean-bg)" />
  <rect width="100%" height="100%" fill="url(#light-glow)" />

  <!-- Blueprint Grid -->
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Shimmering God Rays -->
  <g>
    <polygon points="80,-50 250,-50 450,500 50,500" fill="url(#god-ray-1)" class="ray-1" />
    <polygon points="350,-50 500,-50 800,500 400,500" fill="url(#god-ray-2)" class="ray-2" />
  </g>

  <!-- Swaying Sunken Seaweed / Kelp beds from ocean floor -->
  <g opacity="0.4">
    <path d="M 220 400 C 210 370, 230 340, 220 310 C 210 280, 225 250, 215 220" fill="none" stroke="#2d6b4f" stroke-width="4.5" stroke-linecap="round" class="kelp-1" />
    <path d="M 580 400 C 590 365, 575 330, 585 295 C 595 260, 580 225, 590 190" fill="none" stroke="#1f4c36" stroke-width="5" stroke-linecap="round" class="kelp-2" />
    <path d="M 380 400 C 370 375, 390 350, 385 320 C 380 290, 395 265, 390 235" fill="none" stroke="#2d6b4f" stroke-width="3" stroke-linecap="round" class="kelp-3" />
  </g>

  <!-- Floating Marine Snow (Green) -->
  <circle cx="315" cy="386" r="1.3" class="mote" style="animation-delay: 2s; animation-duration: 9s;" />
  <circle cx="277" cy="137" r="0.8" class="mote" style="animation-delay: 4s; animation-duration: 12s;" />
  <circle cx="297" cy="305" r="1.3" class="mote" style="animation-delay: 1s; animation-duration: 7s;" />
  <circle cx="697" cy="363" r="1.3" class="mote" style="animation-delay: 0.5s; animation-duration: 10s;" />

  <!-- Swimming Ghost Fish Skeletons -->
  <g class="skeleton-container-1" opacity="0.3">
    <g class="skeleton">
      <path d="M 0 0 L 15 0 M 3 4 L 3 -4 M 6 5 L 6 -5 M 9 4 L 9 -4 M 12 3 L 12 -3 M 15 0 L 18 3 M 15 0 L 18 -3 M 0 0 L -3 2 L -3 -2 Z" fill="none" stroke="#66ffb3" stroke-width="1.2" />
    </g>
  </g>
  <g class="skeleton-container-2" opacity="0.25">
    <g class="skeleton">
      <path d="M 0 0 L 15 0 M 3 4 L 3 -4 M 6 5 L 6 -5 M 9 4 L 9 -4 M 12 3 L 12 -3 M 15 0 L 18 3 M 15 0 L 18 -3 M 0 0 L -3 2 L -3 -2 Z" fill="none" stroke="#66ffb3" stroke-width="1" />
    </g>
  </g>

  <!-- Title Overlay -->
  <text x="30" y="40" class="text-main">TYPHOON CLASS SUBMARINE <tspan class="text-red">RED OCTOBER</tspan></text>
  <text x="30" y="58" class="text-sub">STATUS: CONTACT LOST / GHOST SHIP (PUSH &gt; 3D)</text>

  <!-- HUD Telemetry Panel -->
  <g class="hud-text" opacity="0.5">
    <text x="770" y="38" class="hud-label" text-anchor="end">SYS.LOC: UNKNOWN</text>
    <text x="770" y="52" class="hud-label" text-anchor="end">SPD: 0.0 KTS | DEPTH: 480M</text>
  </g>

  <!-- Depth Scale at the Bow (static HUD element) -->
  <g class="hud-element" opacity="0.25">
    <line x1="775" y1="120" x2="775" y2="280" stroke="#66ffb3" stroke-width="0.75" />
    <line x1="771" y1="120" x2="775" y2="120" stroke="#66ffb3" stroke-width="0.75" />
    <text x="766" y="123" class="hud-label" text-anchor="end">400m</text>
    
    <line x1="771" y1="160" x2="775" y2="160" stroke="#66ffb3" stroke-width="0.75" />
    <text x="766" y="163" class="hud-label" text-anchor="end">440m</text>
    
    <line x1="771" y1="200" x2="775" y2="200" stroke="#66ffb3" stroke-width="0.75" />
    <text x="766" y="203" class="hud-label" text-anchor="end">480m</text>
    
    <line x1="771" y1="240" x2="775" y2="240" stroke="#66ffb3" stroke-width="0.75" />
    <text x="766" y="243" class="hud-label" text-anchor="end">520m</text>
    
    <line x1="771" y1="280" x2="775" y2="280" stroke="#66ffb3" stroke-width="0.75" />
    <text x="766" y="283" class="hud-label" text-anchor="end">560m</text>
  </g>

  <!-- Submarine Main Group -->
  <g class="sub" transform="translate(10, 40)">
    
    <!-- Floating Eerie Ghost Motes -->
    <circle cx="200" cy="150" r="1.5" class="ghost-mote" style="animation-delay: 0.0s; animation-duration: 4s;" />
    <circle cx="340" cy="110" r="2.0" class="ghost-mote" style="animation-delay: 1.5s; animation-duration: 5s;" />
    <circle cx="450" cy="130" r="1.2" class="ghost-mote" style="animation-delay: 0.8s; animation-duration: 3.5s;" />
    <circle cx="610" cy="120" r="1.8" class="ghost-mote" style="animation-delay: 2.3s; animation-duration: 4.8s;" />

    <!-- Depth Indicator pointer (moves dynamically with the sub's bobbing) -->
    <g>
      <polygon points="768,160 762,157 762,163" fill="#66ffb3" />
      <line x1="762" y1="160" x2="720" y2="160" stroke="#66ffb3" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.6" />
    </g>

    <!-- Hull-to-propeller connection structure -->
    <path d="M 150 145 L 80 155 L 80 165 L 150 175 Z" class="hull-transition" />
    
    <!-- Propeller blades (Sunken, Static) -->
    <g class="propeller" style="animation: none;">
      <path d="M 85 160 L 75 140 L 80 140 L 90 155 Z" />
      <path d="M 85 160 L 75 180 L 80 180 L 90 165 Z" />
      <path d="M 85 155 L 70 160 L 85 165 Z" />
    </g>

    <!-- Hull and details -->
    <path d="M 150 180 L 130 180 L 120 230 L 145 230 Z" class="hull-lower" />
    <path d="M 150 140 L 130 140 L 115 65 L 140 65 Z" class="hull-upper" />
    <path d="M 105 65 L 150 65 L 148 70 L 110 70 Z" class="hull-upper" />

    <path d="M 150 160 L 150 180 C 200 205, 250 215, 350 215 L 550 215 C 650 215, 730 195, 760 160 Z" class="hull-lower" />
    <path d="M 150 160 L 150 140 C 200 125, 250 125, 350 125 L 650 125 C 720 125, 750 145, 760 160 Z" class="hull-upper" />
    <path d="M 150 160 L 760 160" class="waterline" />
    
    <rect x="680" y="158" width="40" height="4" rx="2" class="details" />

    <!-- Sail & Masts -->
    <g class="sail">
      <path d="M 330 125 L 335 80 L 400 80 L 405 95 L 420 95 L 425 125 Z" class="hull-upper" />
      <rect x="390" y="85" width="4" height="4" class="details" />
      <rect x="396" y="85" width="4" height="4" class="details" />
      <rect x="345" y="60" width="2" height="20" class="details" />
      <rect x="350" y="50" width="1" height="30" class="details" />
      <rect x="365" y="45" width="3" height="35" class="details" />
      <circle cx="366" cy="45" r="3" class="details" />
      <rect x="385" y="55" width="2" height="25" class="details" />

      <!-- Red Star (Spectral Faded Green) -->
      <polygon points="365,95 368,103 376,103 370,108 372,116 365,111 358,116 360,108 354,103 362,103" class="red-star" />
    </g>

    <!-- Upper Deck hatches/details -->
    <g class="details" opacity="0.85">
      <rect x="460" y="124" width="8" height="2" /><rect x="475" y="124" width="8" height="2" />
      <rect x="490" y="124" width="8" height="2" /><rect x="505" y="124" width="8" height="2" />
      <rect x="520" y="124" width="8" height="2" /><rect x="535" y="124" width="8" height="2" />
      <rect x="550" y="124" width="8" height="2" /><rect x="565" y="124" width="8" height="2" />
      <rect x="580" y="124" width="8" height="2" /><rect x="595" y="124" width="8" height="2" />
    </g>
    
    <!-- Hull Panel Lines -->
    <g fill="none" stroke="#050e0a" stroke-width="1.2" opacity="0.3">
      <line x1="250" y1="125" x2="250" y2="160" />
      <line x1="300" y1="125" x2="300" y2="160" />
      <line x1="450" y1="125" x2="450" y2="160" />
      <line x1="650" y1="125" x2="650" y2="160" />
      <line x1="720" y1="133" x2="720" y2="160" />
    </g>
  </g>
</svg>